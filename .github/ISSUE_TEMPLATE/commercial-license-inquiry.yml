name: 💼 商用授權詢問 (Commercial License Inquiry)
description: 想把 EdgeLink 整合進閉源產品 / OEM / 不公開原始碼的整合場景。
title: "[Commercial] "
labels: ["commercial", "license"]
body:
  - type: markdown
    attributes:
      value: |
        感謝對 EdgeLink Server 商用授權感興趣！

        為了快速給你準確報價，請填以下資訊。
        如果偏好私下溝通，可以**直接 email** [cy96241@gmail.com](mailto:cy96241@gmail.com?subject=%5BEdgeLink%20Commercial%20License%5D) — 內容不會公開。

        **初步詢問完全免費、無義務**。

  - type: input
    id: company
    attributes:
      label: 公司名稱 (Company)
      description: 留空也可以，但建議填以便確認 license 對象。
      placeholder: 例：好棒棒科技 / ACME Corp.
    validations:
      required: false

  - type: input
    id: country
    attributes:
      label: 所在國家/地區 (Country / Region)
      placeholder: 例：台灣 / Taiwan / US
    validations:
      required: false

  - type: textarea
    id: usecase
    attributes:
      label: 使用情境 (Use Case)
      description: |
        簡單描述：EdgeLink 會被嵌進什麼產品、解決什麼問題。
        如果有 NDA 顧慮可以模糊化（例：「工業自動化設備」、「VR 訓練系統」）。
      placeholder: |
        例：要把 EdgeLink Server 嵌入工廠生產線監控設備內，
            產品會賣給多家製造業客戶，不希望公開原始碼。
    validations:
      required: true

  - type: dropdown
    id: scenario
    attributes:
      label: 哪種商用情境最接近？
      multiple: false
      options:
        - 公司內部部署（其實 GPL-3.0 就夠用，先確認需求）
        - 賣 SaaS / 雲端服務（GPL-3.0 也允許，不一定要商用 license）
        - "嵌入閉源產品 / Bundle 進公司 software（需要商用 license）"
        - "OEM 嵌入式硬體 / 韌體（需要商用 license + 可能 per-unit royalty）"
        - "Unity / Arduino SDK 連結進閉源 App 散布（需要商用 license）"
        - 想贊助開發 / 委託特定功能
        - 不確定（描述完用途讓你判斷）
    validations:
      required: true

  - type: dropdown
    id: scale
    attributes:
      label: 預估部署規模
      multiple: false
      options:
        - 單一 server / 單一專案
        - "2~10 個部署"
        - "10~100 個部署"
        - "100+ 大規模 / 不確定"
        - OEM 出貨（請估全年產量）
    validations:
      required: true

  - type: dropdown
    id: support
    attributes:
      label: 需要的支援級別
      multiple: false
      options:
        - 不需要（自己摸索就好）
        - 基本 email 詢問
        - 保證回覆 SLA（24h / 48h）
        - 駐廠 / 駐點顧問
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: 有沒有特殊功能需求？
      description: 例：要支援的協定、客製化 mask、整合特定設備等等。
      placeholder: 例：需要支援 OPC UA、需要 ARM Linux build...
    validations:
      required: false

  - type: input
    id: timeline
    attributes:
      label: 預計上線時間
      placeholder: 例：2026 Q3 / 三個月內 / 還在評估
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 聯絡 email
      description: 我可以回覆的 email（不會在 issue 留言公開）。
      placeholder: contact@yourcompany.com
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: 隱私聲明
      options:
        - label: 我同意作者可以針對本 issue 透過上述 email 回覆，並理解本 issue 內容會公開於 GitHub repo（敏感資訊請走 email 直接私訊）。
          required: true
