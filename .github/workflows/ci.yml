name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore EdgeLink-Server.sln

      - name: Build
        run: dotnet build EdgeLink-Server.sln -c Release --no-restore

      - name: Test
        run: dotnet test Server.Tests/Server.Tests.csproj -c Release --no-build --verbosity normal
